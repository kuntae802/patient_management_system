# === patient_management_system (환자 관리 시스템) ===
# 108 서버(nginx + SSL)의 kuntae802 server 블록 안에 추가.
# 외부 https://kuntae802.mooo.com/patient_management_system → 110 컨테이너
#   /patient_management_system        → 110:3002 (web,  Next basePath 보존)
#   /patient_management_system/api/   → 110:8060 (api,  FastAPI; prefix strip → root_path가 문서 URL 보정)
#
# 적용 (108 서버에서):
#   sudo vi /etc/nginx/sites-enabled/kuntae802     (또는 해당 server 블록 파일)
#   → 아래 location 들을 server { } 안에 붙여넣기 (api 블록을 web 블록보다 위에 둔다)
#   sudo nginx -t && sudo systemctl reload nginx
#
# 실 TLS 인증서(Let's Encrypt)는 108이 소유 — 이 파일은 location 라우팅만 담당(데모 배포 시점 작업).

# ── api (FastAPI) — prefix strip 후 컨테이너로 전달 ──
location /patient_management_system/api/ {
    proxy_pass http://192.168.219.110:8060/;   # 끝 슬래시 = /patient_management_system/api/ 제거 후 전달
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# ── web (Next.js) — basePath 보존(끝 슬래시 없는 proxy_pass) ──
location = /patient_management_system {
    proxy_pass http://192.168.219.110:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

location /patient_management_system/ {
    proxy_pass http://192.168.219.110:3002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Supabase 실시간(WebSocket) · Next HMR upgrade
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
