# patient_management_system — CI (라이트 골격)
# 게이트: api Ruff 린트 · web ESLint/타입체크 · supabase 마이그레이션 린트.
# ⚠️ 강화(테스트 커버리지 게이트·E2E·자동 배포)는 Post-MVP (아키텍처 명시).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      # - run: uv run pytest        # 테스트 추가 후 활성화 (후속 스토리)

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  supabase-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - run: supabase db lint --schema public || true   # 골격 단계: 경고만 (마이그레이션은 후속)
